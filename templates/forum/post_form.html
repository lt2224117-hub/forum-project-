{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8"><div class="card p-4">
<h4>Sua binh luan</h4>
<form method="post">{% csrf_token %}
<textarea name="content" class="form-control mb-3" rows="6" required>{{ post.content }}</textarea>
<button type="submit" class="btn btn-primary">Cap nhat</button>
<a href="{% url 'forum:topic_detail' post.topic.pk %}" class="btn btn-outline-secondary ms-2">Huy</a>
</form></div></div></div>
{% endblock %}
