{% extends 'base.html' %}
{% block title %}Dang nhap{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card p-4">
<h3 class="text-center mb-4">Dang nhap</h3>
<form method="post">{% csrf_token %}
{% for field in form %}
<div class="mb-3">
<label class="form-label fw-semibold">{{ field.label }}</label>
<input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="form-control">
</div>
{% endfor %}
<button type="submit" class="btn btn-primary w-100">Dang nhap</button>
</form>
<p class="text-center mt-3">Chua co tai khoan? <a href="{% url 'accounts:register' %}">Dang ky ngay</a></p>
</div></div></div>
{% endblock %}
