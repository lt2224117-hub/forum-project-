{% extends 'base.html' %}
{% block title %}Dang ky{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card p-4">
<h3 class="text-center mb-4">Dang ky tai khoan</h3>
<form method="post">{% csrf_token %}
{% for field in form %}
<div class="mb-3">
<label class="form-label fw-semibold">{{ field.label }}</label>
<input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="form-control {% if field.errors %}is-invalid{% endif %}" {% if field.value %}value="{{ field.value }}"{% endif %}>
{% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
</div>
{% endfor %}
<button type="submit" class="btn btn-primary w-100">Dang ky</button>
</form>
<p class="text-center mt-3">Da co tai khoan? <a href="{% url 'accounts:login' %}">Dang nhap</a></p>
</div></div></div>
{% endblock %}
